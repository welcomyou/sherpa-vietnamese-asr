name: Build portable bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bundle:
        description: "Portable bundle to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - desktop
          - service
      prepare_models:
        description: "Run prepare_offline_build.py before building"
        required: true
        default: true
        type: boolean
      include_gpu_addons:
        description: "Build optional GPU add-on packages"
        required: true
        default: true
        type: boolean
      release_tag:
        description: "Optional tag to publish/update as a GitHub release"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache build inputs
        uses: actions/cache@v4
        with:
          path: |
            .envtietkiem
            models
            python-embedded.zip
          key: portable-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'build-portable/*.py', 'offline_pwa/model_manifest.json') }}
          restore-keys: |
            portable-${{ runner.os }}-

      - name: Set up build environment
        shell: pwsh
        run: python build-portable/setup_build_env.py

      - name: Prepare offline models
        if: ${{ github.event_name == 'push' || inputs.prepare_models }}
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: .\.envtietkiem\Scripts\python.exe build-portable/prepare_offline_build.py

      - name: Build desktop portable
        if: ${{ github.event_name == 'push' || inputs.bundle == 'both' || inputs.bundle == 'desktop' }}
        shell: pwsh
        env:
          SKIP_PREPARE_OFFLINE_MODELS: "1"
        run: .\.envtietkiem\Scripts\python.exe build-portable/build_portable.py

      - name: Build service portable
        if: ${{ github.event_name == 'push' || inputs.bundle == 'both' || inputs.bundle == 'service' }}
        shell: pwsh
        env:
          SKIP_PREPARE_OFFLINE_MODELS: "1"
        run: .\.envtietkiem\Scripts\python.exe build-portable/build_portable_online.py

      - name: Build GPU add-ons
        if: ${{ github.event_name == 'push' || inputs.include_gpu_addons }}
        shell: pwsh
        run: .\.envtietkiem\Scripts\python.exe build-portable/build_gpu_addons.py --all --no-zip

      - name: Zip portable bundles
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $maxPartBytes = 1900MB
          $bufferBytes = 8MB
          $script:SplitArtifactsCreated = $false
          function Split-LargeFile($Path) {
            $source = Get-Item -LiteralPath $Path
            if ($source.Length -lt $maxPartBytes) { return }
            $script:SplitArtifactsCreated = $true
            $buffer = New-Object byte[] $bufferBytes
            $inputStream = [System.IO.File]::OpenRead($source.FullName)
            try {
              $part = 1
              while ($inputStream.Position -lt $inputStream.Length) {
                $partPath = "{0}.{1:D3}" -f $source.FullName, $part
                $outputStream = [System.IO.File]::Create($partPath)
                try {
                  $written = 0
                  while ($written -lt $maxPartBytes) {
                    $toRead = [int][Math]::Min($buffer.Length, $maxPartBytes - $written)
                    $read = $inputStream.Read($buffer, 0, $toRead)
                    if ($read -le 0) { break }
                    $outputStream.Write($buffer, 0, $read)
                    $written += $read
                  }
                } finally {
                  $outputStream.Dispose()
                }
                $part += 1
              }
            } finally {
              $inputStream.Dispose()
            }
            Remove-Item -LiteralPath $source.FullName -Force
          }
          function Get-ArtifactName($DirName) {
            if ($DirName -match '^desktop-portable-cpu-(.+)$') {
              return "sherpa-vietnamese-asr-$($Matches[1]).zip"
            }
            if ($DirName -match '^server-portable-cpu-(.+)$') {
              return "sherpa-vietnamese-asr-service-$($Matches[1]).zip"
            }
            return "$DirName.zip"
          }
          Get-ChildItem -Path dist -Directory | ForEach-Object {
            $zip = Join-Path artifacts (Get-ArtifactName $_.Name)
            Compress-Archive -Path (Join-Path $_.FullName "*") -DestinationPath $zip -Force
            Split-LargeFile -Path $zip
          }
          if ($script:SplitArtifactsCreated) {
          @"
          Large archives are split at 1900MB to stay below GitHub's per-asset limit.
          To reconstruct on Windows:
            copy /b bundle.zip.001+bundle.zip.002+bundle.zip.003 bundle.zip
          Use all parts for the same bundle name, in numeric order.
          "@ | Set-Content -Encoding UTF8 -Path artifacts/README-recombine.txt
          }

      - name: Publish GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          name: Sherpa Vietnamese ASR ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          files: artifacts/*
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true

      - name: Remove old renamed release assets
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $version = $env:RELEASE_TAG -replace '^v', ''
          $oldAssets = @(
            "desktop-portable-cpu-$version.zip",
            "server-portable-cpu-$version.zip"
          )
          $releaseUrl = "$env:GITHUB_API_URL/repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG"
          $release = Invoke-RestMethod -Headers $headers -Uri $releaseUrl
          $hasSplitAssets = @($release.assets | Where-Object { $_.name -match '\.zip\.\d{3}$' }).Count -gt 0
          if (-not $hasSplitAssets) {
            $oldAssets += "README-recombine.txt"
          }
          foreach ($oldName in $oldAssets) {
            $asset = $release.assets | Where-Object { $_.name -eq $oldName } | Select-Object -First 1
            if (-not $asset) {
              Write-Host "No existing release asset to delete: $oldName"
              continue
            }
            $deleteUrl = "$env:GITHUB_API_URL/repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset.id)"
            Invoke-RestMethod -Method Delete -Headers $headers -Uri $deleteUrl
            Write-Host "Deleted old release asset: $oldName"
          }

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-bundles
          path: artifacts/*
          if-no-files-found: error
